name: shipit-release

# padz's shipit release caller (ADP02-WS08, arthur-debert/shipit#841) —
# the WS09 BLESSED per-stage dispatch shape (ADR-0054, workflows.lex §8),
# copied from arthur-debert/standout's caller (standout#187, itself copied
# from arthur-debert/shipit's own shipit-release.yml): one
# workflow_dispatch caller with a `stage` choice
# (full | prepare | build | sign | publish), one job per stage, each a
# single `uses:` line against the matching block, gated
# `if: inputs.stage == '...'`, forwarding
# `version`/`tag`/`run-id`/`unsigned` verbatim. Routing ONLY (ADR-0040):
# the release plan — matrix, live stages, the post-RC-guard endpoint set,
# required secrets — is preflight's, computed inside the blocks; nothing
# is re-derived or wired stage-to-stage here.
#
# This refresh replaces the WS06 interim caller (`stage: full|prepare`
# only): the missing per-stage dispatch landed in shipit as TOL02-WS09
# (shipit#804/#806, ADR-0054 — self-sufficient stage blocks, `tag` +
# `run-id` inputs), and the caller's replacement proof exists (the 1.9.0
# real release, run 29196843153), so the legacy release.yml →
# rust-cli.yml@v3 caller is removed in the same change.
#
# Every ref is the FULL remote `arthur-debert/shipit/...@v1` form — never
# `./` relative (which would resolve against THIS repo, where no blocks
# live), never SHA-pinned (the fleet rides the advance-major-moved `v1`,
# ADR-0010).
#
# padz's release surface (.shipit.toml [artifacts]): `padz`, the
# binary-tarball artifact over darwin-arm64 + linux x86_64/arm64,
# distributed to gh-release + crates (padzapp then padz — shipit derives
# the workspace topo order itself) + brew
# (arthur-debert/homebrew-tools); and `padz-deb`, the cargo-deb leg over
# the linux platforms, gh-release only. The matrix is real, so `build` is
# a live stage. There is NO sign stage: padz ships unsigned darwin
# tarballs by decision (owner, 2026-07-12; the raw-binary
# codesign+notarize leg is owned by arthur-debert/shipit#779), so no
# Apple secret set is forwarded and a `sign` dispatch re-derives the plan
# at the tag, fans over nothing, and skips. The choice stays offered
# because this caller rides the blessed shape, never a trimmed variant.
#
# Secrets — exactly the plan-required set for padz's plan:
#   RELEASE_TOKEN         prepare's tag+branch push through the ruleset
#                         (a GITHUB_TOKEN push would not re-trigger
#                         workflows).
#   HOMEBREW_TAP_TOKEN    the brew endpoint's tap push (stable releases
#                         only — the RC guard drops brew/crates on an
#                         -release-rc version centrally).
#   CARGO_REGISTRY_TOKEN  the crates endpoint's registry token, mapped
#                         HERE from the repo's legacy-named CRATES_IO_KEY
#                         secret (renaming the repo secret is a
#                         repo-settings operation outside this change;
#                         the mapping keeps the caller correct as-is).
# Both publish secrets ride the stages that can publish (`full`,
# `publish`). gh-release rides the workflow's own GITHUB_TOKEN (no
# registry entry).

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          The release version, consumed by `full`/`prepare`: a bare semver
          (1.9.0, 1.9.0-release-rc) or a bump word (major|minor|patch).
          Ignored by the tag-dispatched stages.
        required: false
        type: string
      stage:
        description: >-
          What to dispatch: the full composed chain (default) or ONE
          independently re-runnable stage block (per-stage dispatch,
          ADR-0054). `prepare` dispatches on `version`; `build`, `sign`
          and `publish` on `tag` (+ `run-id` for the artifact-consuming
          stages).
        required: false
        type: choice
        default: full
        options:
          - full
          - prepare
          - build
          - sign
          - publish
      tag:
        description: >-
          The release tag (v<version>), consumed by the `build`/`sign`/
          `publish` stage dispatches (ADR-0041: the version is read off
          the tag). Ignored by `full`/`prepare`.
        required: false
        type: string
      run-id:
        description: >-
          The SOURCE run id whose artifacts feed an artifact-consuming
          stage dispatch (`sign`, `publish`) — one source run per dispatch
          (workflows.lex §8). Ignored by the other stages.
        required: false
        type: string
      unsigned:
        description: >-
          Break-glass: flip a signing plan to the unsigned path. Forwarded
          verbatim; padz's plan has no sign stage (unsigned darwin by
          decision, shipit#779), so preflight refuses it here — offered
          because this caller rides the blessed shape.
        required: false
        type: boolean
        default: false

# The standalone dispatch caller's grant (workflows.lex §8): `contents:
# write` for prepare's push and publish's gh-release, `actions: read` for
# the cross-run artifact downloads (`run-id` flips download-artifact onto
# the REST API). The downloading blocks deliberately declare NO
# `permissions:` key — a called workflow can only downgrade this token.
permissions:
  contents: write
  actions: read

jobs:
  release:
    if: inputs.stage == 'full'
    uses: arthur-debert/shipit/.github/workflows/wf-release.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}

  prepare:
    if: inputs.stage == 'prepare'
    uses: arthur-debert/shipit/.github/workflows/wf-prepare.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build:
    if: inputs.stage == 'build'
    uses: arthur-debert/shipit/.github/workflows/wf-build.yml@v1
    with:
      tag: ${{ inputs.tag }}

  sign:
    if: inputs.stage == 'sign'
    uses: arthur-debert/shipit/.github/workflows/wf-sign-mac.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}

  publish:
    if: inputs.stage == 'publish'
    uses: arthur-debert/shipit/.github/workflows/wf-publish.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
