name: Release

# Reusable release workflow for cargo projects.
#
# Project-specific values live in `env:` below — copy this file to a new
# cargo project and change only that block.
#
# Triggered on tag push `vX.Y.Z`. Does:
#  1. Extract version + release notes from CHANGELOG.md
#  2. Bump workspace version to match the tag (defensive; cargo-release
#     typically handles this locally, but we re-assert for safety)
#  3. Publish all workspace crates to crates.io in dependency order
#  4. Build release binaries for the target matrix
#  5. Attach tarballs to the GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # ─── Project-specific values — edit these when reusing ────────────────
  BIN_NAME: padz
  # The top-level crate to publish last (the one users install).
  CRATE_NAME: padz
  # Space-separated list of dependency crates to publish *before* CRATE_NAME,
  # in dependency order. Leave empty if the project has a single crate.
  EXTRA_CRATES: "padzapp"
  # Seconds to wait after each `cargo publish` so the crates.io index
  # catches up before the next dependent publish.
  PUBLISH_WAIT_SECONDS: "30"
  # ─── Homebrew tap (optional) ──────────────────────────────────────────
  # Owner/repo of the tap. Leave blank or delete the `homebrew-formula`
  # job to disable brew distribution. Requires a `HOMEBREW_TAP_TOKEN`
  # secret — a PAT with contents:write scope on the tap repo.
  HOMEBREW_TAP: arthur-debert/homebrew-tools
  # Formula filename (without `.rb`). Usually equals BIN_NAME.
  HOMEBREW_FORMULA: padz
  # ─── Debian/Ubuntu packages (optional) ───────────────────────────────
  # Build .deb packages for the linux targets and attach them to the
  # GitHub Release. Set to "false" (or delete) to skip. Requires
  # `[package.metadata.deb]` in the crate's Cargo.toml.
  ENABLE_DEB: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section for this version (between ## [VERSION] and next ## [)
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
          echo "=== Release Notes ==="
          cat release-notes.md

      - uses: actions/upload-artifact@v5
        with:
          name: release-notes
          path: release-notes.md

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit (for `cargo set-version`)
        run: cargo install cargo-edit --locked

      - name: Bump workspace version to tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Bumps every workspace member AND every intra-workspace dep pin,
          # and syncs Cargo.lock — no separate `cargo update` needed (that
          # could bump unrelated transitive deps within semver).
          cargo set-version --workspace "$VERSION"
          echo "=== Resolved versions ==="
          cargo pkgid --workspace || true

      - name: Commit version bump
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet; then
            echo "Workspace already at target version; skipping bump commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore: bump version to ${{ needs.prepare.outputs.version }}"
          git push origin "HEAD:$DEFAULT_BRANCH"

      - name: Publish crates to crates.io
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: |
          publish_one() {
            local crate="$1"
            echo "=== Publishing $crate@$VERSION ==="
            if cargo publish -p "$crate" 2>&1; then
              return 0
            fi
            # Tolerate "already published" — common if a release is retried
            if cargo search "$crate" --limit 1 2>/dev/null | grep -q "^$crate = \"$VERSION\""; then
              echo "$crate@$VERSION already on crates.io, skipping."
              return 0
            fi
            echo "Failed to publish $crate@$VERSION"
            return 1
          }

          for crate in $EXTRA_CRATES; do
            publish_one "$crate"
            echo "Waiting ${PUBLISH_WAIT_SECONDS}s for crates.io index..."
            sleep "$PUBLISH_WAIT_SECONDS"
          done
          publish_one "$CRATE_NAME"

  release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: release-notes

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          draft: true

  build-binaries:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: aarch64-apple-darwin
            cross: false
            deb_arch: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: x86_64-apple-darwin
            cross: false
            deb_arch: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: x86_64-linux-gnu
            cross: false
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: aarch64-linux-gnu
            cross: true
            deb_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-edit (for `cargo set-version`)
        run: cargo install cargo-edit --locked

      - name: Bump workspace version to tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: cargo set-version --workspace "$VERSION"

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          else
            cargo build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          fi

      - name: Package binary
        run: |
          ARTIFACT="${BIN_NAME}-${{ matrix.artifact_suffix }}"
          mkdir -p "dist/$ARTIFACT"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$ARTIFACT/"
          # Bundle top-level docs if present — generic across cargo projects.
          # Case-insensitive glob via find so LICENSE.txt / License.md / COPYING
          # variants all get picked up, without failing when nothing matches.
          for f in README.md CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "dist/$ARTIFACT/"
          done
          find . -maxdepth 1 -type f \
            \( -iname 'LICENSE*' -o -iname 'COPYING*' -o -iname 'NOTICE*' \) \
            -exec cp {} "dist/$ARTIFACT/" \;
          cd dist
          tar -czvf "../${ARTIFACT}.tar.gz" "$ARTIFACT"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}.tar.gz

      # ─── Debian package (linux targets only, gated on ENABLE_DEB) ──────
      - name: Install cargo-deb
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true'
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true'
        run: |
          # --no-build reuses the release binary built above. cargo-deb
          # reads [package.metadata.deb] from Cargo.toml and embeds the
          # postinst/prerm maintainer scripts from debian/.
          cargo deb -p "$CRATE_NAME" \
            --target "${{ matrix.target }}" \
            --no-build \
            --no-strip

      - uses: actions/upload-artifact@v5
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true'
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.deb_arch }}-deb
          path: target/${{ matrix.target }}/debian/*.deb

  finalize:
    needs: [prepare, release, build-binaries, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Attach binaries and publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          # Recursive glob for .deb so this works whether upload-artifact
          # flattened paths (v4+ default with a pattern ending in *.deb)
          # or preserved the nested target/<triple>/debian/ structure.
          files: |
            ${{ env.BIN_NAME }}-*.tar.gz
            **/*.deb
          draft: false

  homebrew-formula:
    # Generates a Homebrew formula from .github/homebrew-formula.rb.tmpl
    # and pushes it to the tap repo. Skips cleanly if HOMEBREW_TAP_TOKEN
    # isn't configured, so this job is safe to keep in a reused workflow
    # even before the tap is set up.
    needs: [prepare, finalize]
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured — skipping formula update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for template and Cargo.toml)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5

      - name: Install Rust (for cargo metadata)
        if: steps.guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Download release artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: Gather values for formula
        id: values
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          # Derive formula class name (PascalCase from HOMEBREW_FORMULA,
          # splitting on `-` and `_`). `padz` → `Padz`, `my-tool` → `MyTool`.
          CLASS_NAME=$(echo "$HOMEBREW_FORMULA" | awk -F'[-_]' '{
            for(i=1;i<=NF;i++) printf "%s", toupper(substr($i,1,1)) tolower(substr($i,2))
          }')

          # Pull metadata once, then extract + validate each field. Brew
          # rejects formulas with empty desc/homepage/license at audit
          # time, so fail loudly here with a pointer to the fix.
          PKG_META=$(cargo metadata --no-deps --format-version=1 \
            | jq -cer --arg c "$CRATE_NAME" '.packages[] | select(.name==$c)')
          DESC=$(echo     "$PKG_META" | jq -r '.description // ""')
          LICENSE=$(echo  "$PKG_META" | jq -r '.license // ""')
          HOMEPAGE=$(echo "$PKG_META" | jq -r '.homepage // .repository // ""')

          die_if_empty() {
            local name="$1" value="$2" fix="$3"
            if [ -z "$value" ]; then
              echo "::error::Missing $name for crate '$CRATE_NAME'. $fix"
              exit 1
            fi
          }
          die_if_empty description "$DESC"    "Set package.description in Cargo.toml."
          die_if_empty license     "$LICENSE" "Set package.license in Cargo.toml."
          die_if_empty homepage    "$HOMEPAGE" "Set package.homepage or package.repository in Cargo.toml."

          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${BIN_NAME}"

          sha_for() { sha256sum "${BIN_NAME}-$1.tar.gz" | cut -d' ' -f1; }

          # Emit everything as step outputs for the next step to consume
          # via env.
          {
            echo "class_name=$CLASS_NAME"
            echo "desc=$DESC"
            echo "license=$LICENSE"
            echo "homepage=$HOMEPAGE"
            echo "url_aarch64_apple_darwin=${URL_BASE}-aarch64-apple-darwin.tar.gz"
            echo "url_x86_64_apple_darwin=${URL_BASE}-x86_64-apple-darwin.tar.gz"
            echo "url_x86_64_linux_gnu=${URL_BASE}-x86_64-linux-gnu.tar.gz"
            echo "url_aarch64_linux_gnu=${URL_BASE}-aarch64-linux-gnu.tar.gz"
            echo "sha_aarch64_apple_darwin=$(sha_for aarch64-apple-darwin)"
            echo "sha_x86_64_apple_darwin=$(sha_for  x86_64-apple-darwin)"
            echo "sha_x86_64_linux_gnu=$(sha_for     x86_64-linux-gnu)"
            echo "sha_aarch64_linux_gnu=$(sha_for    aarch64-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Render Homebrew formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION:                   ${{ needs.prepare.outputs.version }}
          CLASS_NAME:                ${{ steps.values.outputs.class_name }}
          DESC:                      ${{ steps.values.outputs.desc }}
          LICENSE:                   ${{ steps.values.outputs.license }}
          HOMEPAGE:                  ${{ steps.values.outputs.homepage }}
          URL_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.url_aarch64_apple_darwin }}
          URL_X86_64_APPLE_DARWIN:   ${{ steps.values.outputs.url_x86_64_apple_darwin }}
          URL_X86_64_LINUX_GNU:      ${{ steps.values.outputs.url_x86_64_linux_gnu }}
          URL_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.url_aarch64_linux_gnu }}
          SHA_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.sha_aarch64_apple_darwin }}
          SHA_X86_64_APPLE_DARWIN:   ${{ steps.values.outputs.sha_x86_64_apple_darwin }}
          SHA_X86_64_LINUX_GNU:      ${{ steps.values.outputs.sha_x86_64_linux_gnu }}
          SHA_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.sha_aarch64_linux_gnu }}
        run: |
          set -euo pipefail
          mkdir -p out
          # Python renders the template. Ruby-string values (DESC, LICENSE,
          # HOMEPAGE) are escaped for Ruby double-quoted context so values
          # containing " or \ don't corrupt the generated formula — a real
          # concern for reusability even if padz's current values are clean.
          python3 .github/render-homebrew-formula.py \
            .github/homebrew-formula.rb.tmpl \
            "out/${HOMEBREW_FORMULA}.rb"

          echo "=== Generated formula ==="
          cat "out/${HOMEBREW_FORMULA}.rb"

      - name: Ruby syntax check
        if: steps.guard.outputs.skip != 'true'
        run: ruby -c "out/${HOMEBREW_FORMULA}.rb"

      - name: Checkout tap repo
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "out/${HOMEBREW_FORMULA}.rb" "tap/Formula/${HOMEBREW_FORMULA}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "${HOMEBREW_FORMULA} ${VERSION}"
          git push
