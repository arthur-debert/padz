name: Release

# Reusable release workflow for cargo projects.
#
# Project-specific values live in `env:` below — copy this file to a new
# cargo project and change only that block.
#
# Triggered on tag push `vX.Y.Z`. Does:
#  1. Extract version + release notes from CHANGELOG.md
#  2. Bump workspace version to match the tag (defensive; cargo-release
#     typically handles this locally, but we re-assert for safety)
#  3. Publish all workspace crates to crates.io in dependency order
#  4. Build release binaries for the target matrix
#  5. Attach tarballs to the GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # ─── Project-specific values — edit these when reusing ────────────────
  BIN_NAME: padz
  # The top-level crate to publish last (the one users install).
  CRATE_NAME: padz
  # Space-separated list of dependency crates to publish *before* CRATE_NAME,
  # in dependency order. Leave empty if the project has a single crate.
  EXTRA_CRATES: "padzapp"
  # Seconds to wait after each `cargo publish` so the crates.io index
  # catches up before the next dependent publish.
  PUBLISH_WAIT_SECONDS: "30"
  # ─── Homebrew tap (optional) ──────────────────────────────────────────
  # Owner/repo of the tap. Leave blank or delete the `homebrew-formula`
  # job to disable brew distribution. Requires a `HOMEBREW_TAP_TOKEN`
  # secret — a PAT with contents:write scope on the tap repo.
  HOMEBREW_TAP: arthur-debert/homebrew-padz
  # Formula filename (without `.rb`). Usually equals BIN_NAME.
  HOMEBREW_FORMULA: padz

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section for this version (between ## [VERSION] and next ## [)
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
          echo "=== Release Notes ==="
          cat release-notes.md

      - uses: actions/upload-artifact@v5
        with:
          name: release-notes
          path: release-notes.md

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit (for `cargo set-version`)
        run: cargo install cargo-edit --locked

      - name: Bump workspace version to tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Bumps every workspace member AND every intra-workspace dep pin,
          # and syncs Cargo.lock — no separate `cargo update` needed (that
          # could bump unrelated transitive deps within semver).
          cargo set-version --workspace "$VERSION"
          echo "=== Resolved versions ==="
          cargo pkgid --workspace || true

      - name: Commit version bump
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet; then
            echo "Workspace already at target version; skipping bump commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore: bump version to ${{ needs.prepare.outputs.version }}"
          git push origin "HEAD:$DEFAULT_BRANCH"

      - name: Publish crates to crates.io
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: |
          publish_one() {
            local crate="$1"
            echo "=== Publishing $crate@$VERSION ==="
            if cargo publish -p "$crate" 2>&1; then
              return 0
            fi
            # Tolerate "already published" — common if a release is retried
            if cargo search "$crate" --limit 1 2>/dev/null | grep -q "^$crate = \"$VERSION\""; then
              echo "$crate@$VERSION already on crates.io, skipping."
              return 0
            fi
            echo "Failed to publish $crate@$VERSION"
            return 1
          }

          for crate in $EXTRA_CRATES; do
            publish_one "$crate"
            echo "Waiting ${PUBLISH_WAIT_SECONDS}s for crates.io index..."
            sleep "$PUBLISH_WAIT_SECONDS"
          done
          publish_one "$CRATE_NAME"

  release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: release-notes

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          draft: true

  build-binaries:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: aarch64-apple-darwin
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: x86_64-apple-darwin
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: x86_64-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: aarch64-linux-gnu
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-edit (for `cargo set-version`)
        run: cargo install cargo-edit --locked

      - name: Bump workspace version to tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: cargo set-version --workspace "$VERSION"

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          else
            cargo build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          fi

      - name: Package binary
        run: |
          ARTIFACT="${BIN_NAME}-${{ matrix.artifact_suffix }}"
          mkdir -p "dist/$ARTIFACT"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$ARTIFACT/"
          # Bundle top-level docs if present — generic across cargo projects.
          # Case-insensitive glob via find so LICENSE.txt / License.md / COPYING
          # variants all get picked up, without failing when nothing matches.
          for f in README.md CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "dist/$ARTIFACT/"
          done
          find . -maxdepth 1 -type f \
            \( -iname 'LICENSE*' -o -iname 'COPYING*' -o -iname 'NOTICE*' \) \
            -exec cp {} "dist/$ARTIFACT/" \;
          cd dist
          tar -czvf "../${ARTIFACT}.tar.gz" "$ARTIFACT"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}.tar.gz

  finalize:
    needs: [prepare, release, build-binaries, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Attach binaries and publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: ${{ env.BIN_NAME }}-*.tar.gz
          draft: false

  homebrew-formula:
    # Generates a Homebrew formula from .github/homebrew-formula.rb.tmpl
    # and pushes it to the tap repo. Skips cleanly if HOMEBREW_TAP_TOKEN
    # isn't configured, so this job is safe to keep in a reused workflow
    # even before the tap is set up.
    needs: [prepare, finalize]
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured — skipping formula update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for template and Cargo.toml)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5

      - name: Install Rust (for cargo metadata)
        if: steps.guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Download release artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: Render Homebrew formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          # Derive the formula class name (PascalCase from HOMEBREW_FORMULA,
          # splitting on `-` and `_`). `padz` → `Padz`, `my-tool` → `MyTool`.
          CLASS_NAME=$(echo "$HOMEBREW_FORMULA" | awk -F'[-_]' '{
            for(i=1;i<=NF;i++) printf "%s", toupper(substr($i,1,1)) tolower(substr($i,2))
          }')
          echo "Formula class: $CLASS_NAME"

          # Pull metadata from Cargo.toml (falls back to repository when
          # homepage is unset, which is typical for workspace crates).
          META=$(cargo metadata --no-deps --format-version=1)
          DESC=$(echo "$META" | jq -r --arg c "$CRATE_NAME" \
            '.packages[] | select(.name==$c) | .description // ""')
          LICENSE=$(echo "$META" | jq -r --arg c "$CRATE_NAME" \
            '.packages[] | select(.name==$c) | .license // ""')
          HOMEPAGE=$(echo "$META" | jq -r --arg c "$CRATE_NAME" \
            '.packages[] | select(.name==$c) | .homepage // .repository // ""')

          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${BIN_NAME}"

          sha_for() {
            sha256sum "${BIN_NAME}-$1.tar.gz" | cut -d' ' -f1
          }
          SHA_AARCH64_APPLE_DARWIN=$(sha_for aarch64-apple-darwin)
          SHA_X86_64_APPLE_DARWIN=$(sha_for  x86_64-apple-darwin)
          SHA_X86_64_LINUX_GNU=$(sha_for     x86_64-linux-gnu)
          SHA_AARCH64_LINUX_GNU=$(sha_for    aarch64-linux-gnu)

          mkdir -p out
          sed \
            -e "s|{{CLASS_NAME}}|${CLASS_NAME}|g" \
            -e "s|{{DESC}}|${DESC}|g" \
            -e "s|{{HOMEPAGE}}|${HOMEPAGE}|g" \
            -e "s|{{VERSION}}|${VERSION}|g" \
            -e "s|{{LICENSE}}|${LICENSE}|g" \
            -e "s|{{BIN_NAME}}|${BIN_NAME}|g" \
            -e "s|{{URL_AARCH64_APPLE_DARWIN}}|${URL_BASE}-aarch64-apple-darwin.tar.gz|g" \
            -e "s|{{URL_X86_64_APPLE_DARWIN}}|${URL_BASE}-x86_64-apple-darwin.tar.gz|g" \
            -e "s|{{URL_X86_64_LINUX_GNU}}|${URL_BASE}-x86_64-linux-gnu.tar.gz|g" \
            -e "s|{{URL_AARCH64_LINUX_GNU}}|${URL_BASE}-aarch64-linux-gnu.tar.gz|g" \
            -e "s|{{SHA_AARCH64_APPLE_DARWIN}}|${SHA_AARCH64_APPLE_DARWIN}|g" \
            -e "s|{{SHA_X86_64_APPLE_DARWIN}}|${SHA_X86_64_APPLE_DARWIN}|g" \
            -e "s|{{SHA_X86_64_LINUX_GNU}}|${SHA_X86_64_LINUX_GNU}|g" \
            -e "s|{{SHA_AARCH64_LINUX_GNU}}|${SHA_AARCH64_LINUX_GNU}|g" \
            .github/homebrew-formula.rb.tmpl > "out/${HOMEBREW_FORMULA}.rb"

          # Fail loudly if any placeholder survived (missing env var or
          # broken sed expression). The template has `{{NAME}}` in a
          # header comment, so exclude that line before checking.
          LEFTOVER=$(grep -v '^#' "out/${HOMEBREW_FORMULA}.rb" | grep -oE '\{\{[A-Z_]+\}\}' || true)
          if [ -n "$LEFTOVER" ]; then
            echo "::error::Unsubstituted placeholders in generated formula: $LEFTOVER"
            exit 1
          fi

          echo "=== Generated formula ==="
          cat "out/${HOMEBREW_FORMULA}.rb"

      - name: Ruby syntax check
        if: steps.guard.outputs.skip != 'true'
        run: ruby -c "out/${HOMEBREW_FORMULA}.rb"

      - name: Checkout tap repo
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "out/${HOMEBREW_FORMULA}.rb" "tap/Formula/${HOMEBREW_FORMULA}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "${HOMEBREW_FORMULA} ${VERSION}"
          git push
