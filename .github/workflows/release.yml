name: Release

# CI-driven release workflow for padz.
#
# Triggered via `scripts/release <version|major|minor|patch>` (which calls
# `gh workflow run release.yml -f version=...`). CI does the version bump,
# CHANGELOG roll, commit, tag, GitHub Release, multi-platform build,
# crates.io publish, .deb attach, and Homebrew formula push.
#
# Project-specific values live in `env:` below — copy this file to a new
# cargo project and change only that block.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.8.0 or 1.8.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # ─── Project-specific values — edit these when reusing ────────────────
  BIN_NAME: padz
  # The top-level crate to publish last (the one users install).
  CRATE_NAME: padz
  # Space-separated list of dependency crates to publish *before* CRATE_NAME,
  # in dependency order. Leave empty if the project has a single crate.
  EXTRA_CRATES: "padzapp"
  # Seconds to wait after each `cargo publish` so the crates.io index
  # catches up before the next dependent publish.
  PUBLISH_WAIT_SECONDS: "30"
  # ─── Homebrew tap (optional) ──────────────────────────────────────────
  # Owner/repo of the tap. Leave blank or delete the `homebrew-formula`
  # job to disable brew distribution. Requires a `HOMEBREW_TAP_TOKEN`
  # secret — a PAT with contents:write scope on the tap repo.
  HOMEBREW_TAP: arthur-debert/homebrew-tools
  # Formula filename (without `.rb`). Usually equals BIN_NAME.
  HOMEBREW_FORMULA: padz
  # ─── Debian/Ubuntu packages (optional) ───────────────────────────────
  # Build .deb packages for the linux targets and attach them to the
  # GitHub Release. Set to "false" (or delete) to skip. Requires
  # `[package.metadata.deb]` in the crate's Cargo.toml.
  ENABLE_DEB: "true"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      release-sha: ${{ steps.bump.outputs.sha }}
      prerelease: ${{ steps.bump.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Validate and prepare
        id: bump
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::version must be MAJOR.MINOR.PATCH[-PRERELEASE] (got: $NEW_VERSION)"
            exit 1
          fi

          IS_PRERELEASE=false
          if [[ "$NEW_VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          TAG="v$NEW_VERSION"
          WORKSPACE_TOML="Cargo.toml"
          CLI_TOML="crates/padz/Cargo.toml"
          # padz uses [workspace.package] version + version.workspace=true
          # in each crate, so the workspace toml is the single source of
          # truth for the bump.
          CURRENT_VERSION=$(grep -E '^version = ' "$WORKSPACE_TOML" | head -1 | sed 's/version = "\(.*\)"/\1/')

          git fetch --tags origin >/dev/null 2>&1 || true

          # Resume case: tag already exists and its commit has Cargo.toml
          # at NEW_VERSION. Happens when a previous run committed+tagged+
          # published to crates.io but a downstream job (e.g. a binary
          # build) failed. Skip the bump so downstream jobs re-run against
          # the tagged commit (release-sha) and fill in what's missing.
          # Note: this does not require tag==HEAD, because follow-up CI
          # fixes may have advanced main past the tag.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            TAG_VERSION=$(git show "$TAG_SHA:$WORKSPACE_TOML" | grep -E '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ "$TAG_VERSION" = "$NEW_VERSION" ]; then
              echo "tag $TAG already exists at $TAG_SHA (Cargo.toml=$TAG_VERSION) — resuming release"
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::tag $TAG exists but Cargo.toml at that commit is $TAG_VERSION, not $NEW_VERSION"
            exit 1
          fi

          OLD_VERSION="$CURRENT_VERSION"
          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "::error::Cargo.toml is already at $NEW_VERSION (but no tag)"
            exit 1
          fi

          # Read content under ## [Unreleased] (until next ## [). Padz
          # uses the Keep-a-Changelog "Unreleased section in CHANGELOG.md"
          # model rather than dodot's separate CHANGELOG_UNRELEASED.md.
          BODY=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG.md has no entries under ## [Unreleased]"
            exit 1
          fi

          echo "Releasing $OLD_VERSION → $NEW_VERSION"

          # Bump workspace.package version (single source of truth).
          sed -i -E "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" "$WORKSPACE_TOML"
          # Bump intra-workspace dep pin in the CLI crate.
          sed -i -E "s/^padzapp = \\{ version = \"$OLD_VERSION\"/padzapp = { version = \"$NEW_VERSION\"/" "$CLI_TOML"
          # Refresh Cargo.lock for both crates.
          cargo update -p padz -p padzapp

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$IS_PRERELEASE" = "true" ]; then
            # Pre-releases share unreleased entries with the final they
            # lead up to: don't roll into a versioned section yet, leave
            # ## [Unreleased] intact so subsequent rc.N / the final
            # release see the same entries.
            git add "$WORKSPACE_TOML" "$CLI_TOML" Cargo.lock
            git commit -m "chore: Release $TAG"
          else
            TODAY=$(date -u +%Y-%m-%d)
            # Replace `## [Unreleased]` with `## [Unreleased]\n\n## [VERSION] - DATE`
            # (matches what cargo-release was doing locally via release.toml's
            # pre-release-replacements). Awk version handles the empty-line
            # insertion cleanly without sed's escaping pain.
            awk -v ver="$NEW_VERSION" -v today="$TODAY" '
              !done && /^## \[Unreleased\]/ {
                print
                print ""
                print "## [" ver "] - " today
                done=1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md

            git add "$WORKSPACE_TOML" "$CLI_TOML" Cargo.lock CHANGELOG.md
            git commit -m "chore: Release $TAG"
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main
          git push origin "$TAG"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  create-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            # Pre-releases haven't rolled into a versioned section yet —
            # read the still-uncleared ## [Unreleased] entries.
            awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          else
            awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: v${{ needs.prepare-release.outputs.version }}
          body_path: release-notes.md
          draft: true
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}

  publish-crates:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Use scripts/ci-publish-crate.sh for the robust two-tier check:
      # 1. Pre-check via crates.io JSON API (skips re-publish entirely)
      # 2. Grep cargo's publish output for "already exists"/"already uploaded"
      # The prior `cargo search VERSION grep` heuristic was broken for
      # re-running an older rc — `cargo search` returns only the LATEST
      # version, so the grep wouldn't match older ones.
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: |
          for crate in $EXTRA_CRATES; do
            scripts/ci-publish-crate.sh "$crate"
            echo "Waiting ${PUBLISH_WAIT_SECONDS}s for crates.io index..."
            sleep "$PUBLISH_WAIT_SECONDS"
          done
          scripts/ci-publish-crate.sh "$CRATE_NAME"

  build-binaries:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: aarch64-apple-darwin
            cross: false
            deb_arch: ""
            sign: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: x86_64-apple-darwin
            cross: false
            deb_arch: ""
            sign: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: x86_64-linux-gnu
            cross: false
            deb_arch: amd64
            sign: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: aarch64-linux-gnu
            cross: true
            deb_arch: arm64
            sign: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          else
            cargo build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          fi

      # ─── macOS code signing + notarization (matrix.sign == true) ──────
      # Ported from dodot's release.yml after that flow was verified end-
      # to-end in dodot v1.0.0-rc.3. Signs both x86_64 and aarch64 darwin
      # so Gatekeeper accepts `brew install padz` without warnings on
      # both Intel and Apple Silicon macs.
      - name: Import signing certificate
        id: import-cert
        if: matrix.sign
        continue-on-error: true
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::warning::No signing certificate configured, skipping code signing"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Sign binary
        if: matrix.sign && steps.import-cert.outputs.signed == 'true'
        run: |
          codesign --sign "$CODESIGN_IDENTITY" --options runtime \
            target/${{ matrix.target }}/release/${{ env.BIN_NAME }}
          codesign --verify --deep --strict target/${{ matrix.target }}/release/${{ env.BIN_NAME }}

      - name: Write App Store Connect API key
        if: matrix.sign && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then
            echo "::warning::No ASC API key configured, skipping notarization"
            exit 0
          fi
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Submit for notarization
        id: notarize-submit
        if: matrix.sign && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then exit 0; fi
          cd target/${{ matrix.target }}/release
          zip "${BIN_NAME}-notarize.zip" "$BIN_NAME"
          RESULT=$(xcrun notarytool submit "${BIN_NAME}-notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "${{ secrets.ASC_API_KEY_ID }}" \
            --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
            --output-format json \
            --no-wait)
          ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "submission-id=$ID" >> "$GITHUB_OUTPUT"
          rm "${BIN_NAME}-notarize.zip"

      - name: Wait for notarization
        if: matrix.sign && steps.notarize-submit.outputs.submission-id
        run: |
          ID="${{ steps.notarize-submit.outputs.submission-id }}"
          for i in $(seq 1 60); do
            RESULT=$(xcrun notarytool info "$ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
              --output-format json 2>&1) || true
            STATUS=$(echo "$RESULT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))" \
              2>/dev/null || echo "Unknown")
            echo "  [$i/60] status=$STATUS ($(date -u +%H:%M:%S))"
            if [ "$STATUS" = "Accepted" ]; then exit 0; fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$ID" \
                --key "$RUNNER_TEMP/AuthKey.p8" \
                --key-id "${{ secrets.ASC_API_KEY_ID }}" \
                --issuer "${{ secrets.ASC_API_ISSUER_ID }}" 2>&1 || true
              exit 1
            fi
            sleep 30
          done
          echo "::warning::Notarization timed out after 30 min. Binary is signed but not notarized."

      - name: Package binary
        run: |
          ARTIFACT="${BIN_NAME}-${{ matrix.artifact_suffix }}"
          mkdir -p "dist/$ARTIFACT"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$ARTIFACT/"
          # Bundle top-level docs if present — generic across cargo projects.
          # Case-insensitive glob via find so LICENSE.txt / License.md / COPYING
          # variants all get picked up, without failing when nothing matches.
          for f in README.md CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "dist/$ARTIFACT/"
          done
          find . -maxdepth 1 -type f \
            \( -iname 'LICENSE*' -o -iname 'COPYING*' -o -iname 'NOTICE*' \) \
            -exec cp {} "dist/$ARTIFACT/" \;
          cd dist
          tar -czvf "../${ARTIFACT}.tar.gz" "$ARTIFACT"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ env.BIN_NAME }}-${{ matrix.artifact_suffix }}.tar.gz

      # ─── Debian package (linux targets only, gated on ENABLE_DEB) ──────
      - name: Install cargo-deb
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true'
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true'
        run: |
          # --no-build reuses the release binary built above. cargo-deb
          # reads [package.metadata.deb] from Cargo.toml and embeds the
          # postinst/prerm maintainer scripts from debian/.
          cargo deb -p "$CRATE_NAME" \
            --target "${{ matrix.target }}" \
            --no-build \
            --no-strip

      - uses: actions/upload-artifact@v5
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true'
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.deb_arch }}-deb
          path: target/${{ matrix.target }}/debian/*.deb

  finalize:
    needs: [prepare-release, create-release, build-binaries, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Attach binaries and publish release
        # Use `gh` CLI directly rather than softprops/action-gh-release@v3.
        # The action attempts a "create-or-update" flow on every call which,
        # when invoked here against the existing draft from create-release,
        # races into creating a duplicate release with the same tag and
        # then fails to flip the original to non-draft (GitHub rejects the
        # PATCH with `tag_name already_exists` because the duplicate also
        # claims the tag). Direct gh CLI is deterministic and idempotent.
        # `--repo` is required because this job has no checkout step and
        # gh otherwise can't infer the repo from a git context.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.prepare-release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Upload tarballs (flattened by upload-artifact) and .debs
          # (which may be at root or under target/<triple>/debian/
          # depending on artifact pattern — the find handles both).
          upload_files=()
          for tgz in "${BIN_NAME}-"*.tar.gz; do
            [ -f "$tgz" ] && upload_files+=("$tgz")
          done
          while IFS= read -r deb; do
            upload_files+=("$deb")
          done < <(find . -type f -name '*.deb')
          if [ ${#upload_files[@]} -eq 0 ]; then
            echo "::error::No tarballs or .debs found to upload"
            exit 1
          fi
          echo "Uploading ${#upload_files[@]} asset(s) to release $TAG:"
          printf '  %s\n' "${upload_files[@]}"
          gh release upload "$TAG" "${upload_files[@]}" --clobber --repo "$REPO"

          # Flip the release from draft to published.
          gh release edit "$TAG" --draft=false --repo "$REPO"

  homebrew-formula:
    # Generates a Homebrew formula from .github/homebrew-formula.rb.tmpl
    # and pushes it to the tap repo. Skips cleanly if HOMEBREW_TAP_TOKEN
    # isn't configured, so this job is safe to keep in a reused workflow
    # even before the tap is set up.
    needs: [prepare-release, finalize]
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured — skipping formula update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for template and Cargo.toml)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Install Rust (for cargo metadata)
        if: steps.guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Download release artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: Gather values for formula
        id: values
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail

          # Derive formula class name (PascalCase from HOMEBREW_FORMULA,
          # splitting on `-` and `_`). `padz` → `Padz`, `my-tool` → `MyTool`.
          CLASS_NAME=$(echo "$HOMEBREW_FORMULA" | awk -F'[-_]' '{
            for(i=1;i<=NF;i++) printf "%s", toupper(substr($i,1,1)) tolower(substr($i,2))
          }')

          # Pull metadata once, then extract + validate each field. Brew
          # rejects formulas with empty desc/homepage/license at audit
          # time, so fail loudly here with a pointer to the fix.
          PKG_META=$(cargo metadata --no-deps --format-version=1 \
            | jq -cer --arg c "$CRATE_NAME" '.packages[] | select(.name==$c)')
          DESC=$(echo     "$PKG_META" | jq -r '.description // ""')
          LICENSE=$(echo  "$PKG_META" | jq -r '.license // ""')
          HOMEPAGE=$(echo "$PKG_META" | jq -r '.homepage // .repository // ""')

          die_if_empty() {
            local name="$1" value="$2" fix="$3"
            if [ -z "$value" ]; then
              echo "::error::Missing $name for crate '$CRATE_NAME'. $fix"
              exit 1
            fi
          }
          die_if_empty description "$DESC"    "Set package.description in Cargo.toml."
          die_if_empty license     "$LICENSE" "Set package.license in Cargo.toml."
          die_if_empty homepage    "$HOMEPAGE" "Set package.homepage or package.repository in Cargo.toml."

          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${BIN_NAME}"

          sha_for() { sha256sum "${BIN_NAME}-$1.tar.gz" | cut -d' ' -f1; }

          # Emit everything as step outputs for the next step to consume
          # via env.
          {
            echo "class_name=$CLASS_NAME"
            echo "desc=$DESC"
            echo "license=$LICENSE"
            echo "homepage=$HOMEPAGE"
            echo "url_aarch64_apple_darwin=${URL_BASE}-aarch64-apple-darwin.tar.gz"
            echo "url_x86_64_apple_darwin=${URL_BASE}-x86_64-apple-darwin.tar.gz"
            echo "url_x86_64_linux_gnu=${URL_BASE}-x86_64-linux-gnu.tar.gz"
            echo "url_aarch64_linux_gnu=${URL_BASE}-aarch64-linux-gnu.tar.gz"
            echo "sha_aarch64_apple_darwin=$(sha_for aarch64-apple-darwin)"
            echo "sha_x86_64_apple_darwin=$(sha_for  x86_64-apple-darwin)"
            echo "sha_x86_64_linux_gnu=$(sha_for     x86_64-linux-gnu)"
            echo "sha_aarch64_linux_gnu=$(sha_for    aarch64-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Render Homebrew formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION:                   ${{ needs.prepare-release.outputs.version }}
          CLASS_NAME:                ${{ steps.values.outputs.class_name }}
          DESC:                      ${{ steps.values.outputs.desc }}
          LICENSE:                   ${{ steps.values.outputs.license }}
          HOMEPAGE:                  ${{ steps.values.outputs.homepage }}
          URL_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.url_aarch64_apple_darwin }}
          URL_X86_64_APPLE_DARWIN:   ${{ steps.values.outputs.url_x86_64_apple_darwin }}
          URL_X86_64_LINUX_GNU:      ${{ steps.values.outputs.url_x86_64_linux_gnu }}
          URL_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.url_aarch64_linux_gnu }}
          SHA_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.sha_aarch64_apple_darwin }}
          SHA_X86_64_APPLE_DARWIN:   ${{ steps.values.outputs.sha_x86_64_apple_darwin }}
          SHA_X86_64_LINUX_GNU:      ${{ steps.values.outputs.sha_x86_64_linux_gnu }}
          SHA_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.sha_aarch64_linux_gnu }}
        run: |
          set -euo pipefail
          mkdir -p out
          # Python renders the template. Ruby-string values (DESC, LICENSE,
          # HOMEPAGE) are escaped for Ruby double-quoted context so values
          # containing " or \ don't corrupt the generated formula — a real
          # concern for reusability even if padz's current values are clean.
          python3 .github/render-homebrew-formula.py \
            .github/homebrew-formula.rb.tmpl \
            "out/${HOMEBREW_FORMULA}.rb"

          echo "=== Generated formula ==="
          cat "out/${HOMEBREW_FORMULA}.rb"

      - name: Ruby syntax check
        if: steps.guard.outputs.skip != 'true'
        run: ruby -c "out/${HOMEBREW_FORMULA}.rb"

      - name: Checkout tap repo
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "out/${HOMEBREW_FORMULA}.rb" "tap/Formula/${HOMEBREW_FORMULA}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "${HOMEBREW_FORMULA} ${VERSION}"
          git push
