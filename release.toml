# cargo-release configuration for padz workspace
# See: https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md
#
# Usage:
#   Local release: cargo release patch --execute (full flow: bump, tag, push, publish)
#   CI release: workflow_dispatch in GitHub Actions (uses --no-publish --no-push flags)

# Keep both crates on the same version
shared-version = true

# Automatically update CLI's dependency on lib when releasing
dependent-version = "upgrade"

# Use a single commit for all version bumps
consolidate-commits = true

# Pre-release commit message
pre-release-commit-message = "Bumped version number to v{{version}}"

# Tag configuration
tag = true
tag-name = "v{{version}}"
tag-message = "Release v{{version}}"

# Git operations
push = true
push-remote = "origin"

# Publish to crates.io
publish = true

# Verify before release
verify = true

# Allow releasing from main branch only
allow-branch = ["main"]

# Changelog handling — fragment-directory model (arthur-debert/release#201).
# bin/changelog renders CHANGELOG.md from CHANGELOG/ fragments. The
# pre-release-hook below runs `bin/changelog new-version <version>` which
# cuts unreleased fragments into CHANGELOG/<version>.md and regenerates
# CHANGELOG.md. cargo-release's built-in replacement engine is disabled
# so it does not re-promote the already-rendered file.
pre-release-hook = ["bin/changelog", "new-version", "{{version}}"]
pre-release-replacements = []
