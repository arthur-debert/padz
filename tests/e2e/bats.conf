#!/usr/bin/env bash
# E2E test configuration — read by the canonical bats setup.bash.

BUILD_CMD="cargo build --bin padz 2>&1 | grep -E 'Compiling|Finished|error' || true"
BINS="padz=target/debug/padz"

WORKSPACE_DIRS="projects/project-a global-data"
GIT_INIT_DIRS="projects/project-a"

ISOLATION="suite"
FIXTURE_SCRIPT="tests/e2e/base-fixture.sh"

EXTRA_HELPERS="helpers.bash assertions.bash backdoors.bash"

e2e_env() {
  padz() { "$PADZ_BIN" "$@"; }
  export WORKSPACE="$SANDBOX"
  export PADZ_GLOBAL_DATA="$SANDBOX/global-data"
  export PROJECT_A="$SANDBOX/projects/project-a"
  export EDITOR=true
  export BATS_LIB_PATH="$HARNESS_ROOT/tests/e2e/bats/helpers"
}
