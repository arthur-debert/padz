# [secrets] — repo Actions secrets. Each table key is the GitHub secret NAME; the
# value names exactly one source ({ doppler = "KEY" } / { env = "VAR" } /
# { prompt = true }). Seeded with shipit's local-reviewer (codex/agy) GitHub App
# credentials, each sourced from Doppler github/prd. `shipit gh-setup` only pushes
# a secret when its source resolves, so these are safe before the App is installed.
[secrets]
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }

# [reviewers] — the required-reviewer SET for this repo's PRs (the map KEYS are
# required; ALL must be DONE to flip Ready). Seeded with shipit's shipped default
# (Copilot, review-once), rendered from the single source in
# `prstate.reviewers_config.DEFAULT_REVIEWERS`. codex/agy are NOT seeded by default —
# their review GitHub Apps are not installed on an arbitrary repo, so requiring them
# would park PRs at REVIEWS_PENDING; a repo that HAS the Apps opts them in here (e.g.
# `codex = {}`). Review-once: `rerun` defaults OFF (token-billed; opt in per reviewer
# with e.g. `copilot = { rerun = true }`).
[reviewers]
copilot = {}

# [lint].ignore — paths the managed lint gate must SKIP. Seeded with common
# generated/assembled files (a built CHANGELOG, package lockfiles) that are not
# hand-written prose, so a freshly-onboarded repo does not take a latent gate
# failure on them. Gitignore-style globs. You OWN this list and may extend it —
# it is reconcile-safe: `shipit install` seeds [lint] only when absent and never
# clobbers a table you have edited.
[lint]
ignore = [
  "CHANGELOG.md",
  "CHANGELOG/**",
  "package-lock.json",
  "pnpm-lock.yaml",
]

# [lanes] — the declared PR-time check units (ADP02-WS05, #176; modeled on
# lex#829). The lane planner (`shipit ci plan`) maps these + the CI event + a
# path-diff to the job matrix the wf-checks workflow block runs
# (`pixi run --locked <run>` per job). Both lanes' tasks SELF-PROVISION,
# because on a hosted runner nothing outside pixi is provisioned:
#   - `lint-full` (NOT the managed bare `lint` task, which runs in the default
#     env where no lint tool exists) resolves into the pixi lint env, where
#     the managed toolchain lives — see its definition in pixi.toml
#     [feature.lint.tasks]. No lexd provisioning: padz tracks no .lex files.
#   - `test` is the managed test task (`./bin/shipit test` -> cargo nextest
#     per the [toolchains] rust map below); cargo + cargo-nextest + uv (for
#     bin/shipit) ride pixi's default env ([dependencies] in pixi.toml). No
#     extra provisioning needed: padz has no submodules and the suite's
#     fixtures live in-tree.
# The bats e2e suite is NOT a lane: it stays on the companion e2e.yml caller
# of release's rust-ci.yml (release-binary build + artifact handoff, bats-core
# + helper libs via the bats-action marketplace action, and the release-core
# `bin/check-e2e` runner arm-gate installs — surface the wf-checks block
# deliberately doesn't carry; doctrine tracked as shipit#778).
[lanes.lint]
run = "lint-full"
required = true
local = true

[lanes.test]
run = "test"
required = true
local = true

[toolchains]
"." = "rust"

# [artifacts] — padz's declared Artifact set for the shipit release pipeline
# (ADP02-WS06, the first real-consumer release cutover; modeled on
# lex-fmt/lex@shipit-rc's TOL02 map). The legacy surface it replaces is
# release.yml → rust-cli.yml@v3 (`crates: padzapp,padz`, `bin-name: padz`,
# defaults: darwin arm64 + linux gnu x86_64/aarch64, brew, apt).
#   - [artifacts.padz] is the binary-tarball artifact (the brew formula
#     subject): archive composition over the same three native-runner
#     platforms the legacy matrix built, distributed to gh-release + crates
#     (padzapp then padz — shipit derives the workspace topo order itself)
#     + brew (the tap is shipit's portfolio constant,
#     arthur-debert/homebrew-tools — same as legacy).
#   - [artifacts.padz-deb] is the legacy `apt: true` leg: cargo-deb against
#     the pre-built release binary (the same `cargo deb -p padz --no-build
#     --no-strip` contract as legacy build-deb), linux platforms only,
#     gh-release only (legacy attached the .debs to the GH release; there is
#     no apt repository endpoint).
# No `sign = true` anywhere (owner decision, 2026-07-12): shipit's mac
# signer covers the coupled .app/.dmg unit, not raw binaries — the raw
# binary codesign+notarize leg the legacy darwin lane ran is owned by
# arthur-debert/shipit#779 and the first real release ships unsigned darwin
# tarballs, recorded.
[artifacts.padz]
build = [{ toolchain = "rust", package = "padz" }]
platforms = ["darwin-arm64", "linux-x86_64", "linux-arm64"]
bundle = { composition = "archive" }
endpoints = ["gh-release", "crates", "brew"]

[artifacts.padz-deb]
build = [{ toolchain = "rust", package = "padz" }]
platforms = ["linux-x86_64", "linux-arm64"]
bundle = { composition = "deb" }
endpoints = ["gh-release"]

